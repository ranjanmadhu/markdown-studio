<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Studio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Merrmaid.js for Diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <!-- Mark.js for Text Highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/mark.min.js"></script>
    <!-- Emoji & KaTeX Extensions -->
    <script src="https://cdn.jsdelivr.net/npm/marked-emoji/lib/index.umd.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
    <!-- PrismJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" id="prism-light" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" id="prism-dark" disabled />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

    <style>
        :root {
            --bg-app: #F4F1ED;
            --text-main: #3C403D;
            --bg-sidebar: #EBE6DF;
            --border-main: #D1D8C5;
            --bg-btn: #4A5D4A;
            --bg-btn-hover: #3D4D3D;
            --bg-panel: #FDFCFB;
            --bg-header: #F9FAFB;
            --text-muted: #7C8B7C;
            --bg-hover: #E0E5D8;
            --editor-text: #5A5A40;
            --bg-white: #ffffff;
        }

        body.dark {
            --bg-app: #1A1D1A;
            --text-main: #E0E5D8;
            --bg-sidebar: #222622;
            --border-main: #3A453A;
            --bg-btn: #6B8E6B;
            --bg-btn-hover: #81A681;
            --bg-panel: #1E221E;
            --bg-header: #252A25;
            --text-muted: #95A595;
            --bg-hover: #2C332C;
            --editor-text: #D1D8C5;
            --bg-white: #1A1D1A;
        }

        body.focus-mode header,
        body.focus-mode aside,
        body.focus-mode footer {
            display: none !important;
        }
        body.focus-mode #editor-column {
            display: none !important;
        }
        body.viewer-full-width #preview-container {
            padding: 1rem !important;
        }
        body.viewer-full-width #preview {
            max-width: none !important;
            padding-left: 2rem !important;
            padding-right: 2rem !important;
            padding-top: 1.5rem !important;
        }
        
        .markdown-body > *:first-child {
            margin-top: 0 !important;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap');
        
        body { 
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; 
        }
        
        /* Markdown Typography overrides */
        .markdown-body {
            font-size: var(--preview-font-size, 16px);
            font-family: var(--preview-font-family, 'Inter', ui-sans-serif, system-ui, sans-serif);
            line-height: 1.6;
            color: var(--text-main);
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
            font-weight: 600;
            color: var(--bg-btn);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            line-height: 1.3;
        }
        .markdown-body h1 { font-family: var(--preview-font-family-h1, ui-serif, Georgia, Cambria, "Times New Roman", Times, serif); font-size: 2.25em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-main); }
        .markdown-body h2 { font-size: 1.75em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-main); color: var(--editor-text); }
        .markdown-body h3 { font-size: 1.5em; color: var(--editor-text); }
        .markdown-body h4 { font-size: 1.25em; color: var(--editor-text); }
        
        .markdown-body p, .markdown-body blockquote, .markdown-body ul, .markdown-body ol, .markdown-body dl, .markdown-body table, .markdown-body pre {
            margin-top: 0;
            margin-bottom: 16px;
        }
        
        .markdown-body a {
            color: var(--bg-btn);
            text-decoration: none;
            font-weight: 500;
        }
        .markdown-body a:hover {
            text-decoration: underline;
        }
        
        .markdown-body ul { list-style-type: disc; padding-left: 2em; }
        .markdown-body ol { list-style-type: decimal; padding-left: 2em; }
        .markdown-body li { margin-bottom: 0.25em; }
        
        .markdown-body blockquote {
            padding: 0 1em;
            color: var(--text-muted);
            border-left: 0.25em solid var(--border-main);
            font-style: italic;
        }
        
        .markdown-body table {
            display: block;
            width: 100%;
            overflow: auto;
            border-spacing: 0;
            border-collapse: collapse;
        }
        .markdown-body table th, .markdown-body table td {
            padding: 8px 13px;
            border: 1px solid var(--border-main);
        }
        .markdown-body table tr:nth-child(2n) {
            background-color: var(--bg-app);
        }
        
        .markdown-body pre {
            background-color: var(--bg-app);
            padding: 16px;
            border-radius: 6px;
            overflow: auto;
        }
        .markdown-body code {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            background-color: var(--bg-app);
            color: var(--editor-text);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-size: 85%;
        }
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            font-size: 100%;
            border-radius: 0;
            white-space: pre;
        }

        /* Custom scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: inherit; }
        ::-webkit-scrollbar-thumb { background: var(--border-main); border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background-color: var(--text-muted); }

        .editor-textarea {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
        }

        mark {
            background-color: #fef08a; /* Yellow tone */
            color: inherit;
            padding: 0 1px;
            border-radius: 2px;
        }
        mark.current-match {
            background-color: #fde047;
            outline: 2px solid #ca8a04;
        }
    </style>
</head>
<body class="bg-[var(--bg-app)] h-screen w-full flex flex-col overflow-hidden text-[var(--text-main)] viewer-full-width">

    <!-- Application Header -->
    <header class="bg-[var(--bg-white)] border-b border-[var(--border-main)] px-4 md:px-6 py-3 flex items-center justify-between shrink-0 z-10">
        <div class="flex items-center gap-3">
            <div class="bg-[var(--bg-btn)] p-1.5 rounded-md flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
            </div>
            <div class="hidden sm:flex items-center gap-2">
                <h1 class="text-xl font-serif italic tracking-tight text-[var(--bg-btn)]">Markdown Studio</h1>
                <span class="px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider bg-green-100 text-green-700 border border-green-200" title="All processing happens in your browser. No data is sent to any API.">100% Local</span>
            </div>
        </div>
        <div class="flex flex-wrap items-center gap-2 md:gap-3">
            <button id="toggle-sidebar" class="px-3 md:px-4 py-1.5 bg-[var(--bg-app)] border border-[var(--border-main)] text-[var(--text-main)] rounded hover:bg-[var(--bg-hover)] text-xs font-medium transition-colors flex items-center gap-2" title="Toggle Explorer Sidebar">
                <svg class="w-4 h-4 text-[var(--bg-btn)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"></path></svg>
                <span class="hidden sm:inline">Explorer</span>
            </button>
            <button onclick="document.getElementById('folder-upload').click()" class="px-3 md:px-4 py-1.5 bg-[var(--bg-app)] border border-[var(--border-main)] text-[var(--text-main)] rounded hover:bg-[var(--bg-hover)] text-xs font-medium transition-colors flex items-center gap-2" title="Open Workspace Folder">
                <svg class="w-4 h-4 text-[var(--bg-btn)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                Open <span class="hidden sm:inline">Folder</span>
            </button>
            <input type="file" id="file-upload" accept=".md,.txt,.markdown" class="hidden" />
            <button onclick="document.getElementById('file-upload').click()" class="px-3 md:px-4 py-1.5 bg-[var(--bg-app)] border border-[var(--border-main)] text-[var(--text-main)] rounded hover:bg-[var(--bg-hover)] text-xs font-medium transition-colors flex items-center gap-2" title="Upload File">
                <svg class="w-4 h-4 text-[var(--bg-btn)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                Upload <span class="hidden sm:inline">File</span>
            </button>
            <button id="toggle-editor" class="px-3 md:px-4 py-1.5 bg-[var(--bg-app)] border border-[var(--border-main)] text-[var(--text-main)] rounded hover:bg-[var(--bg-hover)] text-xs font-medium transition-colors flex items-center gap-2" title="Toggle Editor">
                <svg class="w-4 h-4 text-[var(--bg-btn)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                <span class="hidden sm:inline">Toggle Editor</span>
            </button>
            <button id="toggle-theme" class="px-3 md:px-4 py-1.5 bg-[var(--bg-app)] border border-[var(--border-main)] text-[var(--text-main)] rounded hover:bg-[var(--bg-hover)] text-xs font-medium transition-colors flex items-center gap-2" title="Toggle Theme">
                <svg class="w-4 h-4 text-[var(--bg-btn)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <span class="hidden sm:inline">Theme</span>
            </button>
            <button id="toggle-focus" class="px-3 md:px-4 py-1.5 bg-[var(--bg-app)] border border-[var(--border-main)] text-[var(--text-main)] rounded hover:bg-[var(--bg-hover)] text-xs font-medium transition-colors flex items-center gap-2" title="Focus Mode">
                <svg class="w-4 h-4 text-[var(--bg-btn)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 14v4a2 2 0 002 2h4m10-4v4a2 2 0 01-2 2h-4m2-14h-4m0 0a2 2 0 00-2-2H6a2 2 0 00-2 2v4"></path></svg>
                <span class="hidden sm:inline">Focus</span>
            </button>
            <button id="export-pdf" class="px-3 md:px-4 py-1.5 bg-[var(--bg-app)] border border-[var(--border-main)] text-[var(--text-main)] rounded hover:bg-[var(--bg-hover)] text-xs font-medium transition-colors flex items-center gap-2" title="Export to PDF">
                <svg class="w-4 h-4 text-[var(--bg-btn)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <span class="hidden sm:inline">Export PDF</span>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Sidebar Column -->
        <aside id="sidebar-column" class="w-64 bg-[#E0E5D8] flex flex-col border-r border-[var(--border-main)] shadow-inner transition-all duration-300 hidden shrink-0 z-20 overflow-hidden">
            <div class="p-4 md:p-6 h-full flex flex-col">
              <div class="space-y-4 flex-1 flex flex-col overflow-hidden">
                <input type="file" id="folder-upload" webkitdirectory directory class="hidden" />
                <button id="open-folder-btn" class="w-full flex items-center justify-center gap-2 bg-[var(--bg-btn)] text-white py-1.5 px-4 rounded text-xs font-medium hover:bg-[var(--bg-btn-hover)] transition-colors shadow-sm">
                  <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                  Open Folder
                </button>
                <div class="flex items-center justify-between mt-6 mb-2 shrink-0">
                    <div class="text-[10px] uppercase tracking-widest text-[var(--text-muted)] font-bold">Documents</div>
                    <button id="refresh-folder-btn" class="hidden flex items-center gap-1 text-[10px] font-medium text-[var(--text-muted)] hover:text-[var(--text-main)] transition-colors px-1.5 py-0.5 rounded hover:bg-[var(--bg-hover)]" title="Refresh Folder">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Refresh
                    </button>
                </div>
                <div class="flex-1 overflow-y-auto pr-1 -mr-1">
                    <ul id="file-tree" class="space-y-1">
                        <li class="px-3 py-2 rounded text-[11px] font-medium text-[var(--text-muted)] italic text-center mt-4">No folder opened.<br>Click above to load a folder.</li>
                    </ul>
                </div>
                
                <div class="flex-1 flex flex-col border-t border-[var(--border-main)] pt-4 mt-2 overflow-hidden hidden" id="toc-container">
                    <div class="flex items-center justify-between mb-2 shrink-0">
                        <div class="text-[10px] uppercase tracking-widest text-[var(--text-muted)] font-bold">Contents</div>
                    </div>
                    <div class="flex-1 overflow-y-auto pr-1 -mr-1" id="toc-scroll">
                        <ul id="toc-tree" class="space-y-1 text-[11px] text-[var(--text-main)]">
                        </ul>
                    </div>
                </div>
              </div>
            </div>
        </aside>

        <!-- Editor Column -->
        <div id="editor-column" class="flex-1 flex flex-col border-r border-[var(--border-main)] bg-[var(--bg-panel)] min-h-[50%] md:min-h-0 z-0 transition-opacity duration-300 hidden">
            <div class="px-4 py-1.5 bg-[var(--bg-header)] border-b border-[var(--border-main)] flex justify-between items-center text-[9px] font-bold text-[var(--text-muted)] uppercase tracking-widest shrink-0">
                <div id="editor-title" class="flex items-center gap-2">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    Markdown Editor
                </div>
                <div class="flex items-center gap-2">
                    <button id="reload-file-btn" class="hidden px-2 py-1 bg-[var(--bg-app)] border border-[var(--border-main)] text-[var(--text-main)] rounded text-[10px] items-center gap-1 hover:bg-[var(--bg-hover)] transition-colors" title="Reload from disk"><svg class="w-3 h-3 text-[var(--text-muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Reload</button>
                    <button id="download-btn" class="hidden px-2 py-1 bg-[var(--bg-btn)] text-white rounded text-[10px] items-center gap-1 hover:bg-[var(--bg-btn-hover)] transition-colors"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> Download</button>
                </div>
            </div>
            
            <!-- Formatting Toolbar -->
            <div class="px-2 py-1 bg-[var(--bg-app)] border-b border-[var(--border-main)] flex items-center justify-between shrink-0 overflow-x-auto">
                <div class="flex items-center gap-1">
                    <button class="format-btn p-1.5 text-[var(--text-muted)] hover:text-[var(--text-main)] hover:bg-[var(--bg-panel)] rounded transition-colors" data-format="bold" title="Bold (Ctrl+B)">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg>
                    </button>
                    <button class="format-btn p-1.5 text-[var(--text-muted)] hover:text-[var(--text-main)] hover:bg-[var(--bg-panel)] rounded transition-colors" data-format="italic" title="Italic (Ctrl+I)">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg>
                    </button>
                    <div class="w-px h-4 bg-[var(--border-main)] mx-1"></div>
                    <button class="format-btn p-1.5 text-[var(--text-muted)] hover:text-[var(--text-main)] hover:bg-[var(--bg-panel)] rounded transition-colors" data-format="ul" title="Bulleted List">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    </button>
                    <button class="format-btn p-1.5 text-[var(--text-muted)] hover:text-[var(--text-main)] hover:bg-[var(--bg-panel)] rounded transition-colors" data-format="ol" title="Numbered List">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"></line><line x1="10" y1="12" x2="21" y2="12"></line><line x1="10" y1="18" x2="21" y2="18"></line><path d="M4 6h1v4"></path><path d="M4 10h2"></path><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"></path></svg>
                    </button>
                    <div class="w-px h-4 bg-[var(--border-main)] mx-1"></div>
                    <button class="format-btn p-1.5 text-[var(--text-muted)] hover:text-[var(--text-main)] hover:bg-[var(--bg-panel)] rounded transition-colors" data-format="link" title="Link (Ctrl+K)">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                    </button>
                </div>
                <button id="toggle-wrap-btn" class="p-1.5 text-[var(--bg-btn)] bg-[var(--bg-panel)] shadow-sm rounded transition-colors" title="Toggle Word Wrap">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"></line><path d="M3 12h15a3 3 0 1 1 0 6h-4"></path><polyline points="16 16 14 18 16 20"></polyline><line x1="3" y1="18" x2="7" y2="18"></line></svg>
                </button>
            </div>
            
            <textarea id="editor" class="editor-textarea flex-1 w-full p-6 resize-none outline-none text-[13px] leading-relaxed text-[var(--editor-text)] bg-[var(--bg-panel)]" spellcheck="false" placeholder="Type your markdown here..."># Welcome to Markdown Studio :rocket:

This is a real-time **markdown** preview environment with extended GFM support.
