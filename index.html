    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const editor = document.getElementById('editor');
            const preview = document.getElementById('preview');
            const fileUpload = document.getElementById('file-upload');
            const toggleEditorBtn = document.getElementById('toggle-editor');
            const toggleSidebarBtn = document.getElementById('toggle-sidebar');
            const toggleThemeBtn = document.getElementById('toggle-theme');
            const toggleFocusBtn = document.getElementById('toggle-focus');
            const exportPdfBtn = document.getElementById('export-pdf');
            const exitFocusBtn = document.getElementById('exit-focus-mode');
            const wordCountEl = document.getElementById('word-count');
            const charCountEl = document.getElementById('char-count');
            const readTimeEl = document.getElementById('read-time');
            const expandViewerBtn = document.getElementById('expand-viewer-btn');
            
            const previewFontSelect = document.getElementById('preview-font');
            const previewSizeSelect = document.getElementById('preview-size');

            const editorColumn = document.getElementById('editor-column');
            const sidebarColumn = document.getElementById('sidebar-column');
            const previewContainer = document.getElementById('preview-container');
            const folderUpload = document.getElementById('folder-upload');
            const fileTree = document.getElementById('file-tree');
            const downloadBtn = document.getElementById('download-btn');
            const reloadFileBtn = document.getElementById('reload-file-btn');
            
            let activeFilePath = null;
            let activeFileOriginalContent = null;
            let activeFileLastModified = null;

            function handleFileLoad(content, filePath, lastModified = null) {
                activeFilePath = filePath;
                activeFileOriginalContent = content;
                activeFileLastModified = lastModified;
                localStorage.setItem('md-studio-last-active-path', activeFilePath);
                const stored = localStorage.getItem('md-studio-file-' + filePath);
                if (stored !== null && stored !== content) {
                    editor.value = stored;
                    downloadBtn.classList.remove('hidden');
                    downloadBtn.classList.add('flex');
                } else {
                    editor.value = content;
                    downloadBtn.classList.add('hidden');
                    downloadBtn.classList.remove('flex');
                }
                
                const activeFileEntry = Array.from(currentFiles.values()).find(f => (f.customPath || f.webkitRelativePath || f.name) === activeFilePath);
                if (activeFileEntry && activeFileEntry.fileHandle) {
                    reloadFileBtn.classList.remove('hidden');
                    reloadFileBtn.classList.add('flex');
                } else {
                    reloadFileBtn.classList.remove('flex');
                    reloadFileBtn.classList.add('hidden');
                }
                
                renderContent();
                if(document.getElementById('preview-search')?.value) performSearch();
            }

            reloadFileBtn.addEventListener('click', async () => {
                if(!activeFilePath) return;
                const activeFileEntry = Array.from(currentFiles.values()).find(f => (f.customPath || f.webkitRelativePath || f.name) === activeFilePath);
                if (activeFileEntry && activeFileEntry.fileHandle) {
                    try {
                        const newFile = await activeFileEntry.fileHandle.getFile();
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const newContent = event.target.result;
                            handleFileLoad(newContent, activeFilePath, newFile.lastModified);
                        };
                        reader.readAsText(newFile);
                    } catch (err) {
                        console.error('Reload Error:', err);
                        alert("Could not load file from disk.");
                    }
                } else {
                    alert("This file cannot be reloaded individually. You may need to select it again.");
                }
            });

            downloadBtn.addEventListener('click', () => {
                if(!activeFilePath) return;
                const blob = new Blob([editor.value], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = activeFilePath.split('/').pop();
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                localStorage.removeItem('md-studio-file-' + activeFilePath);
                activeFileOriginalContent = editor.value; // Reset modified state
                downloadBtn.classList.add('hidden');
                downloadBtn.classList.remove('flex');
            });

            // Theme Toggle
            toggleThemeBtn.addEventListener('click', () => {
                const isDark = document.body.classList.toggle('dark');
                const prismLight = document.getElementById('prism-light');
                const prismDark = document.getElementById('prism-dark');
                if (prismLight && prismDark) {
                    prismLight.disabled = isDark;
                    prismDark.disabled = !isDark;
                }
            });

            // Focus Mode Toggle
            toggleFocusBtn.addEventListener('click', () => {
                // Determine the visually centered element before layout changes
                const previewContainer = document.getElementById('preview-container');
                const previewRect = previewContainer.getBoundingClientRect();
                const centerY = previewRect.top + (previewRect.height / 2);
                
                let targetEl = null;
                let minDiff = Infinity;
                const elements = document.getElementById('preview').children;

                for (let i = 0; i < elements.length; i++) {
                    const el = elements[i];
                    const rect = el.getBoundingClientRect();
                    const elCenter = rect.top + (rect.height / 2);
                    const diff = Math.abs(elCenter - centerY);
                    if (diff < minDiff) {
                        minDiff = diff;
                        targetEl = el;
                    }
                }

                document.body.classList.add('focus-mode');
                exitFocusBtn.classList.remove('hidden');
                exitFocusBtn.classList.add('flex');

                if (targetEl) {
                    setTimeout(() => {
                        targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 50);
                }
            });
            
            // Font Customization
            previewFontSelect.addEventListener('change', (e) => {
                const element = document.getElementById('preview');
                const val = e.target.value;
                if (val === 'font-inter') {
                    element.style.setProperty('--preview-font-family', "'Inter', ui-sans-serif, system-ui, sans-serif");
                    element.style.setProperty('--preview-font-family-h1', "ui-serif, Georgia, Cambria, 'Times New Roman', Times, serif");
                } else if (val === 'font-sans') {
                    element.style.setProperty('--preview-font-family', "ui-sans-serif, system-ui, sans-serif");
                    element.style.setProperty('--preview-font-family-h1', "ui-sans-serif, system-ui, sans-serif");
                } else if (val === 'font-serif') {
                    element.style.setProperty('--preview-font-family', "ui-serif, Georgia, Cambria, 'Times New Roman', Times, serif");
                    element.style.setProperty('--preview-font-family-h1', "ui-serif, Georgia, Cambria, 'Times New Roman', Times, serif");
                } else if (val === 'font-mono') {
                    element.style.setProperty('--preview-font-family', "'JetBrains Mono', ui-monospace, SFMono-Regular, monospace");
                    element.style.setProperty('--preview-font-family-h1', "'JetBrains Mono', ui-monospace, SFMono-Regular, monospace");
                } else if (val === 'font-roboto') {
                    element.style.setProperty('--preview-font-family', "'Roboto', sans-serif");
                    element.style.setProperty('--preview-font-family-h1', "'Roboto', sans-serif");
                } else if (val === 'font-opensans') {
                    element.style.setProperty('--preview-font-family', "'Open Sans', sans-serif");
                    element.style.setProperty('--preview-font-family-h1', "'Open Sans', sans-serif");
                } else if (val === 'font-lora') {
                    element.style.setProperty('--preview-font-family', "'Lora', serif");
                    element.style.setProperty('--preview-font-family-h1', "'Lora', serif");
                } else if (val === 'font-merriweather') {
                    element.style.setProperty('--preview-font-family', "'Merriweather', serif");
                    element.style.setProperty('--preview-font-family-h1', "'Merriweather', serif");
                } else if (val === 'font-georgia') {
                    element.style.setProperty('--preview-font-family', "Georgia, serif");
                    element.style.setProperty('--preview-font-family-h1', "Georgia, serif");
                } else if (val === 'font-arial') {
                    element.style.setProperty('--preview-font-family', "Arial, sans-serif");
                    element.style.setProperty('--preview-font-family-h1', "Arial, sans-serif");
                }
            });

            previewSizeSelect.addEventListener('input', (e) => {
                const element = document.getElementById('preview');
                const val = e.target.value;
                element.style.setProperty('--preview-font-size', val + 'px');
            });

            // Export to PDF
            exportPdfBtn.addEventListener('click', async () => {
                const element = document.getElementById('preview');
                const title = document.getElementById('editor-title').innerText || 'markdown-export';
                const filename = (activeFilePath ? activeFilePath.split('/').pop().replace(/\.md$/, '') : 'document');
                const opt = {
                    margin:       [0.5, 0.5],
                    filename:     `${filename}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] },
                    html2canvas:  { scale: 2, useCORS: true, logging: false },
                    jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
                };
                
                const originalPadding = element.style.padding;
                const originalClasses = element.className;
                element.classList.remove('p-6', 'md:p-12', 'min-h-full');
                element.style.padding = '0';
                
                try {
                    await html2pdf().set(opt).from(element).save();
                } finally {
                    element.className = originalClasses;
                    element.style.padding = originalPadding;
                }
            });

            // Exit Focus Mode
            exitFocusBtn.addEventListener('click', () => {
                // Determine the visually centered element before layout changes
                const previewContainer = document.getElementById('preview-container');
                const previewRect = previewContainer.getBoundingClientRect();
                const centerY = previewRect.top + (previewRect.height / 2);
                
                let targetEl = null;
                let minDiff = Infinity;
                const elements = document.getElementById('preview').children;

                for (let i = 0; i < elements.length; i++) {
                    const el = elements[i];
                    const rect = el.getBoundingClientRect();
                    const elCenter = rect.top + (rect.height / 2);
                    const diff = Math.abs(elCenter - centerY);
                    if (diff < minDiff) {
                        minDiff = diff;
                        targetEl = el;
                    }
                }

                document.body.classList.remove('focus-mode');
                exitFocusBtn.classList.add('hidden');
                exitFocusBtn.classList.remove('flex');
                
                if (targetEl) {
                    setTimeout(() => {
                        targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 50);
                }
            });

            // Update Status Bar Stats
            function updateStats() {
                const text = editor.value || '';
                const charCount = text.length;
                const wordCount = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
                const readTime = Math.ceil(wordCount / 200);

                charCountEl.textContent = charCount;
                wordCountEl.textContent = wordCount;
                readTimeEl.textContent = readTime;
            }

            // Sync Stats on Input
            editor.addEventListener('input', () => {
                updateStats();
                if (activeFilePath) {
                    localStorage.setItem('md-studio-file-' + activeFilePath, editor.value);
                    if (editor.value !== activeFileOriginalContent) {
                        downloadBtn.classList.remove('hidden');
                        downloadBtn.classList.add('flex');
                    } else {
                        downloadBtn.classList.add('hidden');
                        downloadBtn.classList.remove('flex');
                    }
                }
            });
            
            // Formatting Toolbar functionality
            const formatButtons = document.querySelectorAll('.format-btn');
            formatButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const format = btn.getAttribute('data-format');
                    applyFormatting(format);
                });
            });

            function applyFormatting(format) {
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                const text = editor.value;
                const selectedText = text.substring(start, end);
                let newText = '';
                let newStart = start;
                let newEnd = end;

                switch (format) {
                    case 'bold':
                        newText = `**${selectedText}**`;
                        newStart = start + 2;
                        newEnd = end + 2;
                        break;
                    case 'italic':
                        newText = `_${selectedText}_`;
                        newStart = start + 1;
                        newEnd = end + 1;
                        break;
                    case 'ul':
                        newText = `- ${selectedText}`;
                        newStart = start + 2;
                        newEnd = end !== start ? start + 2 + selectedText.length : start + 2;
                        break;
                    case 'ol':
                        newText = `1. ${selectedText}`;
                        newStart = start + 3;
                        newEnd = end !== start ? start + 3 + selectedText.length : start + 3;
                        break;
                    case 'link':
                        newText = `[${selectedText}](url)`;
                        newStart = start + 1;
                        newEnd = end + 1;
                        break;
                }

                editor.value = text.substring(0, start) + newText + text.substring(end);
                editor.focus();
                
                if (selectedText.length === 0) {
                    if (format === 'bold') newEnd = newStart = start + 2;
                    else if (format === 'italic') newEnd = newStart = start + 1;
                    else if (format === 'link') {
                        newStart = start + 3;
                        newEnd = start + 6;
                    }
                } else if (format === 'link') {
                    newStart = start + selectedText.length + 3;
                    newEnd = newStart + 3;
                }
                editor.setSelectionRange(newStart, newEnd);
                
                // Trigger input event to update everything automatically
                const event = new Event('input', { bubbles: true });
                editor.dispatchEvent(event);
            }
            
            // Word wrap functionality
            const toggleWrapBtn = document.getElementById('toggle-wrap-btn');
            let isWordWrap = true;

            toggleWrapBtn.addEventListener('click', () => {
                isWordWrap = !isWordWrap;
                if (isWordWrap) {
                    editor.removeAttribute('wrap');
                    editor.classList.remove('whitespace-pre', 'overflow-x-auto');
                    toggleWrapBtn.classList.add('text-[var(--bg-btn)]', 'bg-[var(--bg-panel)]', 'shadow-sm');
                    toggleWrapBtn.classList.remove('text-[var(--text-muted)]');
                } else {
                    editor.setAttribute('wrap', 'off');
                    editor.classList.add('whitespace-pre', 'overflow-x-auto');
                    toggleWrapBtn.classList.remove('text-[var(--bg-btn)]', 'bg-[var(--bg-panel)]', 'shadow-sm');
                    toggleWrapBtn.classList.add('text-[var(--text-muted)]');
                }
            });

            // Toggle Editor Visibility
            toggleEditorBtn.addEventListener('click', () => {
                editorColumn.classList.toggle('hidden');
                document.getElementById('resizer').classList.toggle('hidden');
            });

            // Resizer Logic
            const resizer = document.getElementById('resizer');
            let isResizing = false;
            let currentResizingMode = window.innerWidth >= 768 ? 'horizontal' : 'vertical';

            // Reset inline styles on breakpoint cross
            window.addEventListener('resize', () => {
                const newMode = window.innerWidth >= 768 ? 'horizontal' : 'vertical';
                if (newMode !== currentResizingMode) {
                    currentResizingMode = newMode;
                    editorColumn.style.flex = '';
                    editorColumn.style.width = '';
                    editorColumn.style.height = '';
                }
            });

            resizer.addEventListener('mousedown', (e) => {
                isResizing = true;
                document.body.style.cursor = window.innerWidth >= 768 ? 'col-resize' : 'row-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const editorRect = editorColumn.getBoundingClientRect();
                const parentRect = editorColumn.parentElement.getBoundingClientRect();

                if (window.innerWidth >= 768) {
                    // Desktop (horizontal split)
                    const newWidth = e.clientX - editorRect.left;
                    const maxAllowedWidth = parentRect.width - (editorRect.left - parentRect.left) - 150; // Keep at least 150px for preview
                    if (newWidth > 150 && newWidth < maxAllowedWidth) {
                        editorColumn.style.flex = 'none';
                        editorColumn.style.width = newWidth + 'px';
                    }
                } else {
                    // Mobile (vertical split)
                    const newHeight = e.clientY - editorRect.top;
                    const maxAllowedHeight = parentRect.height - (editorRect.top - parentRect.top) - 100; // Keep at least 100px for preview
                    if (newHeight > 100 && newHeight < maxAllowedHeight) {
                        editorColumn.style.flex = 'none';
                        editorColumn.style.height = newHeight + 'px';
                    }
                }
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });

            // Double click to reset
            resizer.addEventListener('dblclick', () => {
                editorColumn.style.flex = '';
                editorColumn.style.width = '';
                editorColumn.style.height = '';
            });

            // Expand Viewer mode
            expandViewerBtn.addEventListener('click', () => {
                document.body.classList.toggle('viewer-full-width');
            });

            // Toggle Sidebar Visibility
            toggleSidebarBtn.addEventListener('click', () => {
                sidebarColumn.classList.toggle('hidden');
            });

            // Configure marked KaTeX
            if (window.markedKatex) {
                marked.use(window.markedKatex({ throwOnError: false, nonStandard: true }));
            }
            
            // Path resolution utility
            function resolveRelativePath(basePath, relativePath) {
                if (/^(https?|data):/i.test(relativePath)) return relativePath; // Absolute URL
                
                const baseParts = basePath.split('/');
                baseParts.pop(); // Remove file name
                const relParts = relativePath.split('/');
                
                for (const part of relParts) {
                    if (part === '.') continue;
                    if (part === '..') {
                        if (baseParts.length > 0) baseParts.pop();
                    } else {
                        baseParts.push(part);
                    }
                }
                return baseParts.join('/');
            }

            // Configure marked Checkboxes and Images
            marked.use({
                renderer: {
                    checkbox(checked) {
                        return `<input type="checkbox" class="task-list-item-checkbox cursor-pointer" ${checked ? 'checked' : ''}>`;
                    },
                    image(hrefObj, title, text) {
                        let href = typeof hrefObj === 'object' ? hrefObj.href : hrefObj;
                        try { href = decodeURIComponent(href); } catch(e){}
                        const t = typeof hrefObj === 'object' ? hrefObj.title : title;
                        const alt = typeof hrefObj === 'object' ? hrefObj.text : text;
                        let resolvedHref = href;
                        if (activeFilePath && href && !/^(https?|data):/i.test(href)) {
                            const absPath = resolveRelativePath(activeFilePath, href);
                            if (currentImageUrls.has(absPath)) {
                                resolvedHref = currentImageUrls.get(absPath);
                            }
                        }
                        return `<img src="${resolvedHref}" alt="${alt || ''}" title="${t || ''}" class="max-w-full h-auto rounded shadow-sm">`;
                    }
                }
            });

            // Configure marked Emoji
            if (window.markedEmoji) {
                fetch('https://cdn.jsdelivr.net/npm/gemoji/index.json')
                  .then(r => r.json())
                  .then(data => {
                      const emojis = {};
                      data.forEach(item => {
                          if (item.names && item.names.length > 0) {
                              item.names.forEach(name => { emojis[name] = item.emoji; });
                          }
                      });
                      marked.use(window.markedEmoji.markedEmoji({
                          emojis,
                          renderer: (token) => token.emoji
                      }));
                      renderContent(); // Re-render once emoji map loads
                  }).catch(e => console.error("Failed to load emojis:", e));
            }

            // Handle task list checkbox interactions
            preview.addEventListener('change', (e) => {
                if (e.target.tagName.toLowerCase() === 'input' && e.target.type === 'checkbox') {
                    const checkboxes = Array.from(preview.querySelectorAll('input[type="checkbox"]'));
                    const index = checkboxes.indexOf(e.target);
                    if (index > -1) {
                        toggleCheckboxInEditor(index, e.target.checked);
                    }
                }
            });

            function toggleCheckboxInEditor(index, isChecked) {
                let text = editor.value;
                const regex = /(^[ \t>]*[-*+][ \t]+\[)([ xX])(\])/gm;
                let match;
                let count = 0;
                while ((match = regex.exec(text)) !== null) {
                    if (count === index) {
                        const start = match.index + match[1].length;
                        text = text.substring(0, start) + (isChecked ? 'x' : ' ') + text.substring(start + 1);
                        editor.value = text;
                        renderContent();
                        break;
                    }
                    count++;
                }
            }

            // 1. Initialize Mermaid config
            mermaid.initialize({ 
                startOnLoad: false, 
                theme: 'base',
                themeVariables: {
                    primaryColor: '#E0E5D8',
                    primaryBorderColor: '#4A5D4A',
                    primaryTextColor: '#4A5D4A',
                    lineColor: '#4A5D4A',
                    fontFamily: 'Inter, sans-serif'
                }
            });

            // 2. Render Pipeline
            let renderTimeout;
            let currentRenderId = 0;

            function debounceRender() {
                clearTimeout(renderTimeout);
                renderTimeout = setTimeout(renderContent, 300);
            }

            async function renderContent() {
                const renderId = ++currentRenderId;
                let text = editor.value || '';
                
                // Normalize crlf and fix trailing spaces after $$
                text = text.replace(/\r\n/g, '\n');
                text = text.replace(/^(\s*\$\$)\s*$/gm, '$1');
                
                // Ensure block math is preceded by and followed by a blank line so it parses correctly
                text = text.replace(/([^\n])\n(\$\$)(?=\n|$)/g, '$1\n\n$2');
                text = text.replace(/(^\$\$)\n([^\n])/gm, '$1\n\n$2');
                text = text.replace(/([^\n])\n(\$\$)$/gm, '$1\n\n$2');
                
                // Render Markdown to HTML first
                const html = marked.parse(text, {
                    breaks: true,
                    gfm: true
                });
                
                // Discard stale renders
                if (renderId !== currentRenderId) return;
                
                // Inject HTML
                preview.innerHTML = html;

                // Generate TOC
                const tocContainer = document.getElementById('toc-container');
                const tocTree = document.getElementById('toc-tree');
                const headings = preview.querySelectorAll('h1, h2, h3, h4, h5, h6');
                tocTree.innerHTML = '';
                
                if (headings.length > 0) {
                    tocContainer.classList.remove('hidden');
                    headings.forEach((heading, idx) => {
                        const id = 'heading-' + renderId + '-' + idx;
                        heading.id = id;
                        const level = parseInt(heading.tagName.substring(1));
                        const li = document.createElement('li');
                        li.className = 'py-1 hover:bg-[#D1D8C5] rounded cursor-pointer transition-colors truncate text-[var(--text-main)]';
                        li.style.paddingLeft = (0.5 + (level - 1) * 0.75) + 'rem';
                        li.innerText = heading.innerText;
                        li.onclick = () => {
                            heading.scrollIntoView({ behavior: 'smooth' });
                        };
                        tocTree.appendChild(li);
                    });
                } else {
                    tocContainer.classList.add('hidden');
                }

                // Resolve relative paths for raw HTML images
                if (activeFilePath) {
                    const imgs = preview.querySelectorAll('img');
                    imgs.forEach(img => {
                        let originalSrc = img.getAttribute('src');
                        if (originalSrc && !/^(https?|data|blob):/i.test(originalSrc)) {
                            try { originalSrc = decodeURIComponent(originalSrc); } catch(e){}
                            const absPath = resolveRelativePath(activeFilePath, originalSrc);
                            if (currentImageUrls.has(absPath)) {
                                img.src = currentImageUrls.get(absPath);
                            }
                        }
                    });
                }

                // Highlight code blocks
                if (window.Prism) {
                    Prism.highlightAllUnder(preview);
                }

                // Find and render all Mermaid code blocks
                const mermaidBlocks = preview.querySelectorAll('code.language-mermaid');
                const renderPromises = [];

                for (let i = 0; i < mermaidBlocks.length; i++) {
                    const block = mermaidBlocks[i];
                    const pre = block.parentElement; // Get wrapper
                    const code = block.textContent;
                    
                    // Create SVG target container
                    const container = document.createElement('div');
                    container.className = 'mermaid-container my-8 flex justify-center w-full';
                    const targetId = 'mermaid-' + Math.random().toString(36).substr(2, 9);
                    container.id = targetId;
                    
                    // Replace <pre> instantly to avoid jumping layout while parsing
                    pre.parentNode.replaceChild(container, pre);

                    const renderPromise = mermaid.render(targetId + '-svg', code)
                        .then(({ svg }) => {
                            if (renderId === currentRenderId) {
                                // Create a temporary container to inspect the SVG
                                const temp = document.createElement('div');
                                temp.innerHTML = svg;
                                const svgEl = temp.querySelector('svg');
                                
                                // Ensure standard explicit width/height for html2canvas compatibility
                                if (svgEl) {
                                    svgEl.style.maxWidth = '100%';
                                    svgEl.style.height = 'auto';
                                    const viewBox = svgEl.getAttribute('viewBox');
                                    if (viewBox) {
                                        const parts = viewBox.split(' ');
                                        if (parts.length === 4) {
                                            svgEl.setAttribute('width', parts[2]);
                                            svgEl.setAttribute('height', parts[3]);
                                        }
                                    }
                                    
                                    const svgData = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(temp.innerHTML)));
                                    const imgEl = document.createElement('img');
                                    imgEl.className = 'max-w-full h-auto mt-4 mb-8 mx-auto block';
                                    imgEl.src = svgData;
                                    
                                    imgEl.onload = () => {
                                        if (renderId === currentRenderId) {
                                            container.innerHTML = '';
                                            container.appendChild(imgEl);
                                        }
                                    };
                                }
                            }
                        })
                        .catch((error) => {
                            if (renderId === currentRenderId) {
                                container.innerHTML = `<div class="bg-red-50 text-red-600 rounded-md p-4 text-sm font-mono whitespace-pre-wrap border border-red-200 w-full overflow-x-auto"><div class="font-bold mb-2">Mermaid Render Error:</div>${error.message.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
                            }
                        });
                    
                    renderPromises.push(renderPromise);
                }

                await Promise.all(renderPromises);
            }

            // 3. Editor <> Preview Scroll Synchronization
            let isSyncingLeft = false;
            let isSyncingRight = false;
            
            editor.addEventListener('scroll', function() {
                if(!isSyncingLeft) {
                    isSyncingRight = true;
                    // Map scroll percentages rather than absolute pixels to account for height difference
                    const contentH = this.scrollHeight - this.clientHeight;
                    if(contentH > 0) {
                        const percentage = this.scrollTop / contentH;
                        const targetH = previewContainer.scrollHeight - previewContainer.clientHeight;
                        previewContainer.scrollTop = percentage * targetH;
                    }
                }
                isSyncingLeft = false;
            });

            previewContainer.addEventListener('scroll', function() {
                if(!isSyncingRight) {
                    isSyncingLeft = true;
                    const contentH = this.scrollHeight - this.clientHeight;
                    if(contentH > 0) {
                        const percentage = this.scrollTop / contentH;
                        const targetH = editor.scrollHeight - editor.clientHeight;
                        editor.scrollTop = percentage * targetH;
                    }
                }
                isSyncingRight = false;
            });

            // 4. File Drag, Drop & Upload Handling
            editor.addEventListener('input', debounceRender);

            fileUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                sidebarColumn.classList.remove('hidden');
                fileTree.innerHTML = '';
                currentFiles.clear();

                const id = 'file-0';
                currentFiles.set(id, file);

                const li = document.createElement('li');
                const fileDiv = document.createElement('div');
                fileDiv.className = 'px-2 py-1.5 rounded text-[11px] font-medium text-[var(--text-muted)] flex items-center gap-1.5 hover:bg-[#D1D8C5] cursor-pointer transition-colors truncate file-item ml-1';
                fileDiv.title = file.name;
                fileDiv.dataset.id = id;
                fileDiv.innerHTML = `
                    <svg class="opacity-60 shrink-0" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <span class="truncate">${file.name}</span>
                `;
                
                fileDiv.addEventListener('click', () => {
                    document.querySelectorAll('.file-item').forEach(el => {
                        el.classList.remove('bg-[var(--bg-app)]', 'text-[var(--bg-btn)]');
                        el.classList.add('text-[var(--text-muted)]');
                    });
                    fileDiv.classList.add('bg-[var(--bg-app)]', 'text-[var(--bg-btn)]');
                    fileDiv.classList.remove('text-[var(--text-muted)]');
                    
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        handleFileLoad(event.target.result, file.webkitRelativePath || file.name, file.lastModified);
                    };
                    reader.readAsText(file);
                    
                    const mdHeader = document.getElementById('editor-title');
                    if (mdHeader) {
                        mdHeader.innerHTML = `
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            <span class="hidden sm:inline">Markdown</span> Editor <span class="ml-1 sm:ml-2 font-normal lowercase tracking-normal text-gray-400">(${file.name})</span>
                        `;
                    }
                });
                
                li.appendChild(fileDiv);
                fileTree.appendChild(li);
                fileDiv.click();

                fileUpload.value = ''; // Reset
            });

            // Block defaults for drop zones
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                document.body.addEventListener(eventName, e => {
                    e.preventDefault();
                    e.stopPropagation();
                }, false);
            });

            document.body.addEventListener('drop', (e) => {
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    const file = files[0];
                    if (file.name.match(/\.(md|txt|markdown)$/i)) {
                        sidebarColumn.classList.remove('hidden');
                        fileTree.innerHTML = '';
                        currentFiles.clear();

                        const id = 'file-0';
                        currentFiles.set(id, file);

                        const li = document.createElement('li');
                        const fileDiv = document.createElement('div');
                        fileDiv.className = 'px-2 py-1.5 rounded text-[11px] font-medium text-[var(--text-muted)] flex items-center gap-1.5 hover:bg-[#D1D8C5] cursor-pointer transition-colors truncate file-item ml-1';
                        fileDiv.title = file.name;
                        fileDiv.dataset.id = id;
                        fileDiv.innerHTML = `
                            <svg class="opacity-60 shrink-0" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                            <span class="truncate">${file.name}</span>
                        `;
                        
                        fileDiv.addEventListener('click', () => {
                            document.querySelectorAll('.file-item').forEach(el => {
                                el.classList.remove('bg-[var(--bg-app)]', 'text-[var(--bg-btn)]');
                                el.classList.add('text-[var(--text-muted)]');
                            });
                            fileDiv.classList.add('bg-[var(--bg-app)]', 'text-[var(--bg-btn)]');
                            fileDiv.classList.remove('text-[var(--text-muted)]');
                            
                            const reader = new FileReader();
                            reader.onload = (event) => {
                                handleFileLoad(event.target.result, file.webkitRelativePath || file.name, file.lastModified);
                            };
                            reader.readAsText(file);
                            
                            const mdHeader = document.getElementById('editor-title');
                            if (mdHeader) {
                                mdHeader.innerHTML = `
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                    <span class="hidden sm:inline">Markdown</span> Editor <span class="ml-1 sm:ml-2 font-normal lowercase tracking-normal text-gray-400">(${file.name})</span>
                                `;
                            }
                        });
                        
                        li.appendChild(fileDiv);
                        fileTree.appendChild(li);
                        fileDiv.click();
                    } else {
                        alert('Please drop a valid Markdown (.md) or text file.');
                    }
                }
            }, false);

            // Folder Upload & Watch Logic
            let currentFiles = new Map();
            let expandedFolders = new Set();
            let autoRefreshInterval = null;
            let dirHandle = null;
            let isFirstLoad = true;
            let currentImageUrls = new Map();

            const idb = {
                get(key) {
                    return new Promise((resolve, reject) => {
                        const req = indexedDB.open('MdStudioDB', 1);
                        req.onupgradeneeded = e => e.target.result.createObjectStore('store');
                        req.onsuccess = e => {
                            const db = req.result;
                            if (db.objectStoreNames.contains('store')) {
                                const getReq = db.transaction('store', 'readonly').objectStore('store').get(key);
                                getReq.onsuccess = () => resolve(getReq.result);
                                getReq.onerror = () => reject(getReq.error);
                            } else {
                                resolve(null);
                            }
                        };
                        req.onerror = () => reject(req.error);
                    });
                },
                set(key, val) {
                    return new Promise((resolve, reject) => {
                        const req = indexedDB.open('MdStudioDB', 1);
                        req.onupgradeneeded = e => e.target.result.createObjectStore('store');
                        req.onsuccess = e => {
                            const db = req.result;
                            const putReq = db.transaction('store', 'readwrite').objectStore('store').put(val, key);
                            putReq.onsuccess = () => resolve();
                            putReq.onerror = () => reject(putReq.error);
                        };
                        req.onerror = () => reject(req.error);
                    });
                }
            };

            const refreshFolderBtn = document.getElementById('refresh-folder-btn');
            refreshFolderBtn.addEventListener('click', () => {
                if (dirHandle) {
                    processDirectoryHandle(dirHandle, false).catch(err => {
                        console.error("Refresh error:", err);
                        alert("Refresh error: " + err.message);
                    });
                }
            });

            const actualOpenFolderBtn = document.getElementById('open-folder-btn');
            actualOpenFolderBtn.addEventListener('click', async () => {
                if (window.showDirectoryPicker) {
                    try {
                        dirHandle = await window.showDirectoryPicker({ mode: 'read' });
                        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
                        isFirstLoad = true;
                        expandedFolders.clear();
                        
                        refreshFolderBtn.classList.remove('hidden');
                        refreshFolderBtn.classList.add('flex');
                        
                        await idb.set('workspace-dirHandle', dirHandle);
                        
                        await processDirectoryHandle(dirHandle, true);
                    } catch (e) {
                        if (e.name !== 'AbortError') {
                            folderUpload.click(); // Fallback
                        }
                    }
                } else {
                    folderUpload.click();
                }
            });

            folderUpload.addEventListener('change', (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                processFilesArray(Array.from(files), true);
                e.target.value = '';
            });

            async function processDirectoryHandle(handle, isInit = true) {
                const files = [];
                async function traverse(currentHandle, path) {
                    for await (const entry of currentHandle.values()) {
                        if (entry.kind === 'file' && entry.name.match(/\.(md|txt|markdown|png|jpe?g|gif|svg|webp)$/i)) {
                            const fileData = await entry.getFile();
                            // Use a custom path since webkitRelativePath is read-only
                            fileData.customPath = path + entry.name;
                            fileData.fileHandle = entry;
                            files.push(fileData);
                        } else if (entry.kind === 'directory') {
                            await traverse(entry, path + entry.name + '/');
                        }
                    }
                }
                await traverse(handle, handle.name + '/');
                processFilesArray(files, isInit);
            }

            function processFilesArray(filesArr, isInit = false) {
                if (isInit) {
                    sidebarColumn.classList.remove('hidden');
                }

                currentFiles.clear();
                
                // Clear old image URLs
                currentImageUrls.forEach(url => URL.revokeObjectURL(url));
                currentImageUrls.clear();

                const mdFiles = [];
                filesArr.forEach(file => {
                    const path = file.customPath || file.webkitRelativePath || file.name;
                    if (path.match(/\.(md|txt|markdown)$/i)) {
                        mdFiles.push(file);
                    } else if (path.match(/\.(png|jpe?g|gif|svg|webp)$/i)) {
                        currentImageUrls.set(path, URL.createObjectURL(file));
                    }
                });

                mdFiles.sort((a, b) => {
                    const pathA = a.customPath || a.webkitRelativePath || a.name;
                    const pathB = b.customPath || b.webkitRelativePath || b.name;
                    return pathA.localeCompare(pathB);
                });

                if (mdFiles.length === 0) {
                    fileTree.innerHTML = '<li class="px-3 py-2 rounded text-[11px] font-medium text-[var(--text-muted)] italic text-center mt-4">No markdown files found in folder.</li>';
                    return;
                }

                const tree = {};
                mdFiles.forEach((file, index) => {
                    const fullPath = file.customPath || file.webkitRelativePath || file.name;
                    const parts = fullPath.split('/');
                    let current = tree;
                    parts.forEach((part, i) => {
                        if (!current[part]) {
                            current[part] = {
                                name: part,
                                isFile: i === parts.length - 1,
                                children: {},
                                file: i === parts.length - 1 ? file : null,
                                index: i === parts.length - 1 ? index : null,
                                path: parts.slice(0, i + 1).join('/')
                            };
                        }
                        current = current[part].children;
                    });
                });

                fileTree.innerHTML = '';
                renderTree(tree, fileTree);
                
                // Keep the active file highlighted
                if (activeFilePath) {
                    const allFileItems = document.querySelectorAll('.file-item');
                    allFileItems.forEach(el => {
                        if (el.dataset.path === activeFilePath) {
                            el.classList.add('bg-[var(--bg-app)]', 'text-[var(--bg-btn)]');
                            el.classList.remove('text-[var(--text-muted)]');
                        } else {
                            el.classList.remove('bg-[var(--bg-app)]', 'text-[var(--bg-btn)]');
                            el.classList.add('text-[var(--text-muted)]');
                        }
                    });
                }
                
                        if (activeFilePath && !isInit) {
                    const activeFile = filesArr.find(f => (f.customPath || f.webkitRelativePath || f.name) === activeFilePath);
                    if (activeFile) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const newContent = event.target.result;
                            if (newContent !== activeFileOriginalContent) {
                                const hasLocalEdits = editor.value !== activeFileOriginalContent;
                                if (!hasLocalEdits) {
                                    const scrollPos = editor.scrollTop;
                                    const previewScrollPos = previewContainer.scrollTop;
                                    handleFileLoad(newContent, activeFilePath, activeFile.lastModified);
                                    setTimeout(() => { 
                                        editor.scrollTop = scrollPos; 
                                        previewContainer.scrollTop = previewScrollPos;
                                    }, 0);
                                } else {
                                    activeFileLastModified = activeFile.lastModified;
                                }
                            } else {
                                activeFileLastModified = activeFile.lastModified;
                            }
                        };
                        reader.readAsText(activeFile);
                    }
                }

                if (isFirstLoad && mdFiles.length > 0) {
                    const savedActivePath = localStorage.getItem('md-studio-last-active-path');
                    let targetFile = null;
                    if (savedActivePath) {
                        const els = Array.from(fileTree.querySelectorAll('.file-item'));
                        targetFile = els.find(el => el.dataset.path === savedActivePath);
                    }
                    if (!targetFile) {
                        targetFile = fileTree.querySelector('.file-item');
                    }
                    if (targetFile) targetFile.click();
                    isFirstLoad = false;
                }
                
                // Force a render in case images updated but the active markdown file itself didn't change
                if (!isFirstLoad) {
                    renderContent();
                }
            }

            function renderTree(node, container, level = 0) {
                const ul = document.createElement('ul');
                if (level > 0) {
                    ul.className = 'pl-1.5 ml-2 border-l border-[var(--border-main)] mt-0.5 space-y-0.5';
                } else {
                    ul.className = 'space-y-0.5 w-full';
                }
                
                const nodes = Object.values(node).sort((a, b) => {
                    if (a.isFile !== b.isFile) return a.isFile ? 1 : -1;
                    return a.name.localeCompare(b.name);
                });

                nodes.forEach(n => {
                    const li = document.createElement('li');
                    
                    if (n.isFile) {
                        const id = 'file-' + n.index;
                        currentFiles.set(id, n.file);
                        
                        const fileDiv = document.createElement('div');
                        const fPath = n.file.customPath || n.file.webkitRelativePath || n.file.name;
                        fileDiv.className = 'px-2 py-1.5 rounded text-[11px] font-medium text-[var(--text-muted)] flex items-center gap-1.5 hover:bg-[#D1D8C5] cursor-pointer transition-colors truncate file-item ml-1';
                        fileDiv.title = fPath;
                        fileDiv.dataset.id = id;
                        fileDiv.dataset.path = fPath;
                        fileDiv.innerHTML = `
                            <svg class="opacity-60 shrink-0" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                            <span class="truncate">${n.name}</span>
                        `;
                        
                        fileDiv.addEventListener('click', () => {
                            document.querySelectorAll('.file-item').forEach(el => {
                                el.classList.remove('bg-[var(--bg-app)]', 'text-[var(--bg-btn)]');
                                el.classList.add('text-[var(--text-muted)]');
                            });
                            fileDiv.classList.add('bg-[var(--bg-app)]', 'text-[var(--bg-btn)]');
                            fileDiv.classList.remove('text-[var(--text-muted)]');
                            
                            const fetchAndLocateFile = async () => {
                                try {
                                    let actualFile = n.file;
                                    if (actualFile.fileHandle) {
                                        actualFile = await actualFile.fileHandle.getFile();
                                    }
                                    const reader = new FileReader();
                                    reader.onload = (event) => {
                                        handleFileLoad(event.target.result, fPath, actualFile.lastModified);
                                    };
                                    reader.readAsText(actualFile);
                                } catch (err) {
                                    console.error('Click to read failed:', err);
                                    alert('Failed to read file from disk: ' + err.message);
                                }
                            };
                            fetchAndLocateFile();
                            
                            const mdHeader = document.getElementById('editor-title');
                            if (mdHeader) {
                                mdHeader.innerHTML = `
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                    <span class="hidden sm:inline">Markdown</span> Editor <span class="ml-1 sm:ml-2 font-normal lowercase tracking-normal text-gray-400">(${n.name})</span>
                                `;
                            }
                        });
                        li.appendChild(fileDiv);
                    } else {
                        const dirPath = n.path;
                        const isInitiallyOpen = expandedFolders.has(dirPath);
                        // Default to true if not initialized tracking
                        const isOpen = expandedFolders.has(dirPath) || (level === 0 && !expandedFolders.size);
                        if (isOpen) expandedFolders.add(dirPath);

                        const dirDiv = document.createElement('div');
                        dirDiv.className = 'px-1.5 py-1 rounded text-[11px] font-semibold text-[var(--text-main)] flex items-center gap-1 hover:bg-[var(--bg-hover)] cursor-pointer transition-colors truncate folder-item mt-1';
                        
                        const caret = document.createElement('span');
                        caret.innerHTML = isOpen
                            ? `<svg class="w-3 h-3 transition-transform duration-200 transform rotate-90 text-[var(--text-muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>` 
                            : `<svg class="w-3 h-3 transition-transform duration-200 text-[var(--text-muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>`;
                        
                        dirDiv.innerHTML += `<svg class="opacity-80 shrink-0 text-[var(--bg-btn)]" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>`;
                        dirDiv.innerHTML += `<span class="truncate">${n.name}</span>`;
                        dirDiv.prepend(caret);
                        
                        const childrenContainer = document.createElement('div');
                        childrenContainer.className = 'overflow-hidden transition-all duration-200';
                        childrenContainer.style.display = isOpen ? 'block' : 'none';
                        renderTree(n.children, childrenContainer, level + 1);
                        
                        dirDiv.addEventListener('click', () => {
                            const willBeOpen = childrenContainer.style.display === 'none';
                            childrenContainer.style.display = willBeOpen ? 'block' : 'none';
                            caret.innerHTML = willBeOpen
                                ? `<svg class="w-3 h-3 transition-transform duration-200 transform rotate-90 text-[var(--text-muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>` 
                                : `<svg class="w-3 h-3 transition-transform duration-200 text-[var(--text-muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>`;
                            
                            if (willBeOpen) expandedFolders.add(dirPath);
                            else expandedFolders.delete(dirPath);
                        });
                        
                        li.appendChild(dirDiv);
                        li.appendChild(childrenContainer);
                    }
                    ul.appendChild(li);
                });
                container.appendChild(ul);
            }
                 
            // Search functionality in Preview
            const searchInput = document.getElementById('preview-search');
            const searchPrev = document.getElementById('search-prev');
            const searchNext = document.getElementById('search-next');
            const searchCount = document.getElementById('search-count');
            
            let markInstance = null;
            let searchResults = [];
            let currentSearchIndex = -1;

            function performSearch() {
                if (!markInstance) markInstance = new Mark(document.getElementById('preview'));
                const searchInput = document.getElementById('preview-search');
                const term = searchInput ? searchInput.value : '';
                
                markInstance.unmark({
                    done: function() {
                        if (!term) {
                            searchCount.textContent = '';
                            searchResults = [];
                            currentSearchIndex = -1;
                            return;
                        }
                        
                        markInstance.mark(term, {
                            separateWordSearch: false,
                            done: function(count) {
                                searchResults = document.querySelectorAll('#preview mark');
                                currentSearchIndex = -1;
                                if (count > 0) {
                                    currentSearchIndex = 0;
                                    highlightCurrentSearch();
                                } else {
                                    searchCount.textContent = '0/0';
                                }
                            }
                        });
                    }
                });
            }

            function highlightCurrentSearch() {
                if (searchResults.length === 0) return;
                
                // Remove current class from all
                searchResults.forEach(el => el.classList.remove('current-match'));
                
                const currentEl = searchResults[currentSearchIndex];
                if (currentEl) {
                    currentEl.classList.add('current-match');
                    currentEl.scrollIntoView({
                        behavior: 'smooth',
                        block: 'center'
                    });
                }
                
                searchCount.textContent = `${currentSearchIndex + 1}/${searchResults.length}`;
            }

            searchInput.addEventListener('input', () => {
                performSearch();
            });
            
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (e.shiftKey) {
                        if (searchResults.length > 0) {
                            currentSearchIndex = (currentSearchIndex - 1 + searchResults.length) % searchResults.length;
                            highlightCurrentSearch();
                        }
                    } else {
                        if (searchResults.length > 0) {
                            currentSearchIndex = (currentSearchIndex + 1) % searchResults.length;
                            highlightCurrentSearch();
                        }
                    }
                }
            });

            searchNext.addEventListener('click', () => {
                if (searchResults.length > 0) {
                    currentSearchIndex = (currentSearchIndex + 1) % searchResults.length;
                    highlightCurrentSearch();
                }
            });

            searchPrev.addEventListener('click', () => {
                if (searchResults.length > 0) {
                    currentSearchIndex = (currentSearchIndex - 1 + searchResults.length) % searchResults.length;
                    highlightCurrentSearch();
                }
            });

            // Re-run search when editor content changes
            let searchTimeout;
            editor.addEventListener('input', () => {
                const searchInput = document.getElementById('preview-search');
                if (searchInput?.value) {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(performSearch, 150);
                }
            });
            
            // Re-bind search after render
            const originalRenderContent = renderContent;
            renderContent = function() {
                originalRenderContent();
                const searchInput = document.getElementById('preview-search');
                if (searchInput?.value) {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(performSearch, 150);
                }
            };

            // Auto-restore logic
            idb.get('workspace-dirHandle').then((handle) => {
                if (handle) {
                    fileTree.innerHTML = `
                        <li class="px-3 py-4 text-center">
                            <button id="restore-workspace-btn" class="w-full bg-[var(--bg-app)] border border-[var(--border-main)] hover:bg-[var(--bg-hover)] text-[var(--bg-btn)] transition-colors py-2 rounded text-[11px] font-medium shadow-sm">
                                Restore Previous Workspace
                            </button>
                        </li>
                    `;
                    document.getElementById('restore-workspace-btn').addEventListener('click', async () => {
                        const btn = document.getElementById('restore-workspace-btn');
                        btn.textContent = 'Restoring...';
                        try {
                            const opts = { mode: 'read' };
                            if ((await handle.queryPermission(opts)) === 'granted' || (await handle.requestPermission(opts)) === 'granted') {
                                dirHandle = handle;
                                isFirstLoad = true;
                                refreshFolderBtn.classList.remove('hidden');
                                refreshFolderBtn.classList.add('flex');
                                await processDirectoryHandle(dirHandle, true);
                            } else {
                                fileTree.innerHTML = '<li class="px-3 py-2 rounded text-[11px] font-medium text-[var(--text-muted)] italic text-center mt-4">Permission denied.<br>Click open folder above.</li>';
                            }
                        } catch (e) {
                            console.error(e);
                            fileTree.innerHTML = '<li class="px-3 py-2 rounded text-[11px] font-medium text-[var(--text-muted)] italic text-center mt-4">Failed to restore workspace.</li>';
                        }
                    });
                }
            });

            // Initial auto-render for placeholder content
            if (editor.value) {
                renderContent();
            }
            updateStats();
        });
    </script>
</body>
</html>
